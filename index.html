<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AntionWhat — Backup local de chats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --aw-purple-dark: #2e1065;
  --aw-purple: #4a1d96;
  --aw-purple-mid: #6d28d9;
  --aw-purple-light: #8b5cf6;
  --aw-purple-pale: #ede9fe;
  --aw-green: #25d366;
  --aw-green-dark: #128c7e;
  --aw-green-bubble: #d9fdd3;
  --aw-chat-bg: #eae3d8;
  --aw-border: rgba(0,0,0,0.10);
  --aw-text: #111827;
  --aw-text-muted: #6b7280;
  --aw-text-faint: #9ca3af;
  --aw-sidebar-w: 300px;
  --aw-radius: 12px;
  --font-d: 'Space Grotesk', system-ui, sans-serif;
  --font-b: 'Inter', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:#f7f7f7;min-height:100vh;display:flex;flex-direction:column}
#app{display:flex;flex-direction:column;height:100vh;max-height:100vh;overflow:hidden}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:linear-gradient(135deg,var(--aw-purple-dark) 0%,var(--aw-purple) 55%,var(--aw-purple-mid) 100%);flex-shrink:0;z-index:10}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0}
.logo-name{font-family:var(--font-d);font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.3px;line-height:1.1}
.logo-tag{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.4px}
.tb-actions{display:flex;gap:2px}
.tb-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.7);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;transition:background 0.15s,color 0.15s}
.tb-btn:hover{background:rgba(255,255,255,0.15);color:#fff}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--aw-sidebar-w);min-width:var(--aw-sidebar-w);display:flex;flex-direction:column;background:#fff;border-right:1px solid var(--aw-border);transition:transform 0.25s ease}
#search-wrap{padding:8px 12px;border-bottom:1px solid var(--aw-border)}
.search-inner{display:flex;align-items:center;gap:8px;background:#f3f4f6;border-radius:20px;padding:0 12px}
.search-inner i{font-size:15px;color:var(--aw-text-faint);flex-shrink:0}
.search-inner input{flex:1;border:none;background:none;padding:7px 0;font-size:13px;font-family:var(--font-b);color:var(--aw-text);outline:none}
.search-inner input::placeholder{color:var(--aw-text-faint)}

#stats-row{display:flex;border-bottom:1px solid var(--aw-border)}
.stat-cell{flex:1;text-align:center;padding:6px 4px;border-right:1px solid var(--aw-border)}
.stat-cell:last-child{border-right:none}
.stat-val{font-family:var(--font-d);font-size:16px;font-weight:600;color:var(--aw-purple-mid)}
.stat-lbl{font-size:10px;color:var(--aw-text-faint);margin-top:1px}

#filter-row{display:flex;gap:4px;padding:6px 10px;border-bottom:1px solid var(--aw-border);overflow-x:auto}
#filter-row::-webkit-scrollbar{display:none}
.chip{border:1px solid #e5e7eb;background:none;border-radius:14px;padding:3px 11px;font-size:12px;font-family:var(--font-b);color:var(--aw-text-muted);cursor:pointer;white-space:nowrap;transition:all 0.15s}
.chip.active{background:var(--aw-purple-mid);color:#fff;border-color:var(--aw-purple-mid)}

#chat-list{flex:1;overflow-y:auto}
#chat-list::-webkit-scrollbar{width:4px}
#chat-list::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}

.chat-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.05);transition:background 0.12s}
.chat-item:hover{background:#f9f5ff}
.chat-item.active{background:#ede9fe}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:600;font-size:14px;flex-shrink:0}
.chat-meta{flex:1;min-width:0}
.chat-meta-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.chat-name{font-size:14px;font-weight:500;color:var(--aw-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.chat-date{font-size:10px;color:var(--aw-text-faint);flex-shrink:0}
.chat-preview{font-size:12px;color:var(--aw-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.badge-group{font-size:10px;padding:1px 5px;border-radius:8px;background:#dbeafe;color:#1e40af;flex-shrink:0}

#sidebar-foot{padding:8px 12px;border-top:1px solid var(--aw-border);display:flex;align-items:center;gap:8px}
#sidebar-foot small{font-size:11px;color:var(--aw-text-faint);flex:1}
.load-btn{background:var(--aw-purple-mid);color:#fff;border:none;border-radius:16px;padding:5px 14px;font-size:12px;font-family:var(--font-b);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background 0.15s}
.load-btn:hover{background:var(--aw-purple)}

/* DROPZONE */
#drop-zone{margin:12px;border:2px dashed #d1d5db;border-radius:var(--aw-radius);padding:24px 16px;text-align:center;cursor:pointer;color:var(--aw-text-muted);transition:all 0.2s}
#drop-zone:hover,#drop-zone.drag-over{border-color:var(--aw-purple-light);background:#f5f3ff}
#drop-zone .dz-icon{font-size:30px;color:var(--aw-purple-light);margin-bottom:6px}
#drop-zone p{font-size:13px;font-weight:500;margin-bottom:3px}
#drop-zone small{font-size:11px;color:var(--aw-text-faint)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;background:var(--aw-chat-bg);min-width:0}
#main-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.empty-logo{width:72px;height:72px;border-radius:50%;opacity:0.3}
#main-empty p{font-family:var(--font-d);font-size:18px;font-weight:600;color:#6b7280}
#main-empty small{font-size:13px;color:#9ca3af}

/* CHAT HEADER */
#ch-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--aw-border);flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-family:var(--font-d);font-size:15px;font-weight:600;color:var(--aw-text)}
.ch-sub{font-size:11px;color:var(--aw-text-muted)}
.ch-actions{display:flex;gap:2px}
.ch-btn{background:none;border:none;cursor:pointer;color:var(--aw-text-muted);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background 0.12s,color 0.12s}
.ch-btn:hover{background:#f3f4f6;color:var(--aw-text)}

/* CHAT SEARCH */
#ch-searchbar{display:none;align-items:center;gap:8px;padding:6px 14px;background:#fff;border-bottom:1px solid var(--aw-border)}
#ch-searchbar input{flex:1;border:none;background:#f3f4f6;border-radius:16px;padding:6px 12px;font-size:13px;font-family:var(--font-b);color:var(--aw-text);outline:none}
#ch-searchbar .sr{font-size:11px;color:var(--aw-text-faint);white-space:nowrap}

/* MESSAGES */
#msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:2px}
#msgs::-webkit-scrollbar{width:4px}
#msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px}
.msg{max-width:68%;padding:7px 11px;font-size:13.5px;line-height:1.5;word-wrap:break-word;font-family:var(--font-b)}
.msg.out{align-self:flex-end;background:var(--aw-green-bubble);color:#111;border-radius:10px 2px 10px 10px}
.msg.inn{align-self:flex-start;background:#fff;color:var(--aw-text);border-radius:2px 10px 10px 10px}
.msg.sys{align-self:center;background:rgba(0,0,0,0.07);color:var(--aw-text-muted);font-size:11.5px;padding:3px 12px;border-radius:10px;max-width:80%;text-align:center}
.msg .ms{font-size:11.5px;font-weight:600;color:var(--aw-purple-mid);margin-bottom:2px;font-family:var(--font-d)}
.msg .mt{font-size:10.5px;color:#9ca3af;text-align:right;margin-top:3px}
.msg .media-ph{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#888;background:rgba(0,0,0,0.05);padding:4px 8px;border-radius:6px;margin-bottom:2px}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:#fff;border-radius:var(--aw-radius);padding:22px;width:300px;max-width:90vw}
#modal h3{font-family:var(--font-d);font-size:15px;font-weight:600;margin-bottom:8px;color:var(--aw-text)}
#modal p{font-size:13px;color:var(--aw-text-muted);margin-bottom:18px;line-height:1.55;white-space:pre-line}
#modal .mbtns{display:flex;justify-content:flex-end;gap:8px}
.mbtn{border:1px solid #e5e7eb;background:none;border-radius:8px;padding:7px 16px;font-size:13px;font-family:var(--font-b);cursor:pointer;color:var(--aw-text);transition:background 0.12s}
.mbtn:hover{background:#f9fafb}
.mbtn.danger{background:#dc2626;color:#fff;border-color:#dc2626}
.mbtn.danger:hover{background:#b91c1c}
.mbtn.purple{background:var(--aw-purple-mid);color:#fff;border-color:var(--aw-purple-mid)}
.mbtn.purple:hover{background:var(--aw-purple)}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;font-size:12.5px;font-family:var(--font-b);padding:8px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity 0.25s;white-space:nowrap;z-index:200}

/* MOBILE */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50}
#back-btn{display:none;background:none;border:none;color:rgba(255,255,255,0.8);font-size:20px;cursor:pointer;padding:4px;margin-right:4px;align-items:center;justify-content:center}

@media(max-width:640px){
  :root{--aw-sidebar-w:100vw}
  #sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:60;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.show{display:block}
  .msg{max-width:82%}
  #topbar{padding:0 10px}
  .logo-name{font-size:15px}
  #back-btn{display:flex!important}
}
</style>
</head>

<input type="file" id="fi" multiple accept=".html,.txt,.json" style="display:none">
<input type="file" id="jfi" accept=".json" style="display:none">

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Confirmar</h3>
    <p id="modal-msg">¿Seguro?</p>
    <div class="mbtns">
      <button class="mbtn" id="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="mbtn danger" id="modal-ok">Confirmar</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const fi = document.getElementById('fi');
const jfi = document.getElementById('jfi');
const chatList = document.getElementById('chat-list');
const mainArea = document.getElementById('main');

let chats = [];
let activeIdx = null;
let filterMode = 'all';
let favorites = new Set();
let searchQuery = '';
let isMobile = window.innerWidth <= 640;

window.addEventListener('resize', () => {
  isMobile = window.innerWidth <= 640;
  document.getElementById('menu-btn').style.display = isMobile ? 'flex' : 'none';
});
if (isMobile) document.getElementById('menu-btn').style.display = 'flex';

fi.addEventListener('change', e => loadFiles(e.target.files));
jfi.addEventListener('change', e => importBackupJSON(e.target.files[0]));

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
function closeMobileChat() {
  activeIdx = null;
  const logoSrc = document.getElementById('logo-img')?.src || '';
  mainArea.innerHTML = `<div id="main-empty"><img class="empty-logo" src="${logoSrc}" alt=""><p>AntionWhat</p><small>Tu backup local de chats WhatsApp</small></div>`;
  renderList();
  if (isMobile) toggleSidebar();
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  loadFiles(e.dataTransfer.files);
}

/* ────────────────────────────────────────────────
   FILE LOADING — detecta tipo por extensión
───────────────────────────────────────────────── */
function loadFiles(files) {
  let pending = files.length;
  if (!pending) return;
  Array.from(files).forEach(f => {
    const r = new FileReader();
    r.onload = ev => {
      let chat = null;
      const ext = f.name.split('.').pop().toLowerCase();
      try {
        if (ext === 'json') {
          chat = parseJSON(ev.target.result, f.name);
        } else if (ext === 'html' || ext === 'htm') {
          chat = parseHTML(ev.target.result, f.name);
        } else {
          chat = parseTXT(ev.target.result, f.name);
        }
      } catch(err) {
        console.warn('Error parsing', f.name, err);
        chat = fallbackChat(f.name);
      }
      if (chat) mergeChat(chat);
      pending--;
      if (pending === 0) {
        chats.sort((a, b) => (b.sortDate || 0) - (a.sortDate || 0));
        updateStats(); renderList();
        const unique = new Set(chats.map(c => c.chatKey)).size;
        toast(`${files.length} archivo${files.length !== 1 ? 's' : ''} cargado${files.length !== 1 ? 's' : ''} · ${chats.length} chats únicos ✓`);
        if (isMobile) closeSidebar();
      }
    };
    r.readAsText(f, 'utf-8');
  });
}

/* ────────────────────────────────────────────────
   DEDUPLICACIÓN POR CLAVE NORMALIZADA
   Mismos chats en múltiples formatos (.html/.json/.txt)
   se fusionan en uno solo, priorizando el que tenga
   más mensajes (html > json > txt como desempate).
───────────────────────────────────────────────── */

// Prioridad por extensión (menor = mejor)
const FORMAT_PRIORITY = { html: 0, htm: 0, json: 1, txt: 2 };

function getChatKey(name) {
  // Normaliza el nombre para usarlo como clave de identidad:
  // "+57 315 6678428" → "573156678428"
  // "Juan Pérez" → "juanperez"
  return name
    .toLowerCase()
    .replace(/[+\s\-().]/g, '')   // quitar +, espacios, guiones, paréntesis
    .replace(/[áàä]/g, 'a').replace(/[éèë]/g, 'e')
    .replace(/[íìï]/g, 'i').replace(/[óòö]/g, 'o')
    .replace(/[úùü]/g, 'u').replace(/ñ/g, 'n')
    .replace(/[^a-z0-9]/g, '');  // solo alfanumérico
}

function getFilePriority(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  return FORMAT_PRIORITY[ext] ?? 99;
}

function mergeChat(chat) {
  const key = getChatKey(chat.name);
  chat.chatKey = key;
  chat.filePriority = getFilePriority(chat.filename);

  const existingIdx = chats.findIndex(c => c.chatKey === key);
  if (existingIdx === -1) {
    // No existe → agregar directamente
    chats.push(chat);
  } else {
    const existing = chats[existingIdx];
    // Reemplazar si el nuevo tiene más mensajes,
    // o igual mensajes pero mejor formato (html > json > txt)
    const newIsBetter =
      chat.messages.length > existing.messages.length ||
      (chat.messages.length === existing.messages.length &&
       chat.filePriority < existing.filePriority);
    if (newIsBetter) {
      chats[existingIdx] = chat;
    }
    // Si no es mejor, simplemente ignorar el duplicado
  }
}

/* ────────────────────────────────────────────────
   PARSER 1 — HTML exportado por AntionWhat
   <div class="m i"> y <div class="m o">
   Título en <h2> dentro de .hi
───────────────────────────────────────────────── */
function parseHTML(html, filename) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Nombre del chat: primero el <h2> del header, luego el <title>
  let name = '';
  const h2 = doc.querySelector('.hi h2, .hdr h2');
  if (h2) name = h2.textContent.trim();
  if (!name) {
    const t = doc.querySelector('title');
    if (t) name = t.textContent.replace(/^Chat:\s*/i, '').trim();
  }
  if (!name) name = filename.replace(/\.html?$/i, '').replace(/_/g, ' ').trim();

  // Número de mensajes del subtítulo (para verificación)
  const msgs = [];

  // Buscar los divs de mensajes: clase "m i" (entrante) o "m o" (saliente)
  const allDivs = doc.querySelectorAll('div.m');
  allDivs.forEach(el => {
    const isOut = el.classList.contains('o');
    // Extraer texto ignorando el span.ts (timestamp interno)
    const tsEl = el.querySelector('.ts');
    let timeStr = '';
    if (tsEl) { timeStr = tsEl.textContent.trim(); tsEl.remove(); }

    // Detectar media
    const mediaEl = el.querySelector('.media-ph');
    let mediaType = null;
    let text = '';
    if (mediaEl) {
      const mt = mediaEl.textContent.trim();
      if (mt.includes('Imagen') || mt.includes('IMAGE')) mediaType = 'image';
      else if (mt.includes('Video') || mt.includes('VIDEO')) mediaType = 'video';
      else if (mt.includes('Audio') || mt.includes('AUDIO')) mediaType = 'audio';
      else if (mt.includes('Sticker') || mt.includes('STICKER')) mediaType = 'sticker';
      else mediaType = 'media';
      text = '';
    } else {
      // Convertir <br> a \n antes de extraer textContent
      el.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
      text = el.textContent.trim();
    }

    if (!text && !mediaType) return;
    msgs.push({ text, time: timeStr, out: isOut, mediaType });
  });

  // Si no encontró mensajes con div.m, intentar parsear el textContent como TXT
  if (msgs.length === 0) {
    return parseTXT(doc.body ? doc.body.textContent : html, filename);
  }

  const preview = buildPreview(msgs[msgs.length - 1]);
  return { name, messages: msgs, preview, sortDate: Date.now(), isGroup: false, filename };
}

/* ────────────────────────────────────────────────
   PARSER 2 — JSON exportado por AntionWhat
   [{ts, dir:"i"|"o", text, media_type?}]
   o backup completo {meta, chats:[...]}
───────────────────────────────────────────────── */
function parseJSON(raw, filename) {
  const data = JSON.parse(raw);

  // Si es un backup completo de AntionWhat, lo importamos todo
  if (data.chats) {
    // Importación masiva — llamar importBackupJSON directamente
    importBackupData(data);
    return null; // señal para no agregar como chat individual
  }

  // Si es un array directo de mensajes (chat individual exportado)
  let arr = Array.isArray(data) ? data : (data.chat?.messages || data.messages || []);
  if (!arr.length) return fallbackChat(filename);

  const msgs = arr.map(m => ({
    text: m.text || '',
    time: m.ts || '',
    out: m.dir === 'o',
    mediaType: m.media_type || null
  }));

  // Nombre: del filename  "_57_315_6678428.json" → "+57 315 6678428"
  const name = filenameToName(filename);
  const preview = buildPreview(msgs[msgs.length - 1]);
  return { name, messages: msgs, preview, sortDate: Date.now(), isGroup: false, filename };
}

/* ────────────────────────────────────────────────
   PARSER 3 — TXT exportado por AntionWhat
   "Chat: +57 xxx\nExportado: ...\n\nENTRANTE: ...\nSALIENTE: ..."
   O formato exportación nativa de WhatsApp
   "DD/MM/YYYY, HH:MM - Nombre: mensaje"
───────────────────────────────────────────────── */
function parseTXT(text, filename) {
  const lines = text.split('\n');

  // ── Formato AntionWhat TXT (ENTRANTE:/SALIENTE:) ──
  if (text.includes('ENTRANTE:') || text.includes('SALIENTE:')) {
    return parseAntionTXT(lines, filename);
  }

  // ── Formato nativo WhatsApp ──
  return parseWhatsAppNativeTXT(lines, filename);
}

function parseAntionTXT(lines, filename) {
  const msgs = [];
  let current = null;

  for (const line of lines) {
    if (line.startsWith('ENTRANTE:') || line.startsWith('SALIENTE:')) {
      if (current) msgs.push(current);
      const isOut = line.startsWith('SALIENTE:');
      const textPart = line.replace(/^(ENTRANTE|SALIENTE):\s*/, '');
      // Detectar media placeholders
      let mediaType = null;
      let text = textPart;
      if (textPart.match(/^\[IMAGE\]$/i)) { mediaType = 'image'; text = ''; }
      else if (textPart.match(/^\[VIDEO\]$/i)) { mediaType = 'video'; text = ''; }
      else if (textPart.match(/^\[AUDIO\]$/i)) { mediaType = 'audio'; text = ''; }
      else if (textPart.match(/^\[STICKER\]$/i)) { mediaType = 'sticker'; text = ''; }
      current = { text, out: isOut, time: '', mediaType };
    } else if (current && line.trim() && !line.startsWith('Chat:') && !line.startsWith('Exportado:') && !line.startsWith('Mensajes')) {
      // Continuación multilínea del mensaje actual
      current.text += '\n' + line;
    }
  }
  if (current) msgs.push(current);

  if (!msgs.length) return fallbackChat(filename);
  const name = filenameToName(filename);
  const preview = buildPreview(msgs[msgs.length - 1]);
  return { name, messages: msgs, preview, sortDate: Date.now(), isGroup: false, filename };
}

function parseWhatsAppNativeTXT(lines, filename) {
  const msgs = [];
  const authors = new Set();
  let firstAuthor = null;
  // Patrones de timestamp nativo de WhatsApp
  const re1 = /^[\[(](\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})[,\s]+(\d{1,2}:\d{2}(?::\d{2})?(?:\s?[aApP]\.?[mM]\.?)?)[\])]\s+([^:]+):\s(.+)$/;
  const re2 = /^(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})[,\s]+(\d{1,2}:\d{2}(?::\d{2})?(?:\s?[aApP]\.?[mM]\.?)?)\s[-–]\s([^:]+):\s(.+)$/;

  lines.forEach(line => {
    let m = line.match(re1) || line.match(re2);
    if (m) {
      const [, date, time, author, txt] = m;
      if (!firstAuthor) firstAuthor = author;
      authors.add(author);
      msgs.push({ text: txt.trim(), time, date, author, out: false });
    }
  });

  if (!msgs.length) return fallbackChat(filename);

  // Determinar quién es "yo" (el primero en hablar) y nombre del chat
  msgs.forEach(m => { m.out = m.author === firstAuthor; if (m.out) m.author = 'Tú'; });
  const allA = [...authors];
  let name = filenameToName(filename);
  if (allA.length === 2) { const other = allA.find(a => a !== firstAuthor); if (other) name = other; }

  const preview = buildPreview(msgs[msgs.length - 1]);
  return { name, messages: msgs, preview, sortDate: Date.now(), isGroup: authors.size > 2, filename };
}

/* ────────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────────── */
function filenameToName(fn) {
  // "_57_315_6678428.json" → "+57 315 6678428"
  let n = fn.replace(/\.(html?|txt|json)$/i, '').replace(/_/g, ' ').trim();
  // Si empieza con " 57 " convertir a "+57 "
  n = n.replace(/^\s*(\d{2})\s/, '+$1 ');
  return n || fn;
}

function buildPreview(msg) {
  if (!msg) return '';
  if (msg.mediaType) {
    const icons = { image: '🖼️ Imagen', video: '🎥 Video', audio: '🎵 Audio', sticker: '🎨 Sticker', media: '📎 Archivo' };
    return icons[msg.mediaType] || '📎 Archivo';
  }
  return (msg.text || '').slice(0, 70).replace(/\n/g, ' ');
}

function fallbackChat(filename) {
  return {
    name: filenameToName(filename),
    messages: [{ text: '(Sin mensajes o formato no reconocido)', out: false, time: '', mediaType: null }],
    preview: 'Sin mensajes',
    sortDate: Date.now(),
    isGroup: false,
    filename
  };
}

function importBackupData(data) {
  const loaded = data.chats || [];
  const before = chats.length;
  loaded.filter(Boolean).forEach(c => {
    if (!c.chatKey) c.chatKey = getChatKey(c.name || '');
    if (!c.filePriority) c.filePriority = getFilePriority(c.filename || '');
    mergeChat(c);
  });
  const count = chats.length - before;
  chats.sort((a, b) => (b.sortDate || 0) - (a.sortDate || 0));
  updateStats(); renderList();
  toast(`Backup importado: ${count} chat${count !== 1 ? 's' : ''} nuevo${count !== 1 ? 's' : ''} ✓`);
}

function importBackupJSON(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      // Si es backup completo
      if (data.chats) { importBackupData(data); return; }
      // Si es chat individual
      loadFiles([file]);
    } catch(e) { toast('Error al leer el JSON'); }
  };
  r.readAsText(file);
}

/* ────────────────────────────────────────────────
   DEDUP MANUAL — para chats ya cargados
───────────────────────────────────────────────── */
function deduplicateAll() {
  const before = chats.length;
  const seen = new Map(); // chatKey → índice en resultado
  const result = [];
  for (const chat of chats) {
    const key = chat.chatKey || getChatKey(chat.name || '');
    chat.chatKey = key;
    if (!chat.filePriority) chat.filePriority = getFilePriority(chat.filename || '');
    if (!seen.has(key)) {
      seen.set(key, result.length);
      result.push(chat);
    } else {
      const existingIdx = seen.get(key);
      const existing = result[existingIdx];
      const newIsBetter =
        chat.messages.length > existing.messages.length ||
        (chat.messages.length === existing.messages.length &&
         chat.filePriority < existing.filePriority);
      if (newIsBetter) result[existingIdx] = chat;
    }
  }
  chats = result;
  const removed = before - chats.length;
  if (activeIdx !== null && activeIdx >= chats.length) {
    activeIdx = null;
    const logoSrc = document.getElementById('logo-img')?.src || '';
    mainArea.innerHTML = `<div id="main-empty"><img class="empty-logo" src="${logoSrc}" alt=""><p>AntionWhat</p><small>Tu backup local de chats WhatsApp</small></div>`;
  }
  updateStats(); renderList();
  toast(removed > 0 ? `${removed} duplicado${removed !== 1 ? 's' : ''} eliminado${removed !== 1 ? 's' : ''} · ${chats.length} chats únicos ✓` : 'Sin duplicados detectados ✓');
}

function updateStats() {
  document.getElementById('st-chats').textContent = chats.length;
  const total = chats.reduce((s, c) => s + c.messages.length, 0);
  document.getElementById('st-msgs').textContent = total >= 1000 ? (total / 1000).toFixed(1) + 'k' : total;
  document.getElementById('st-groups').textContent = chats.filter(c => c.isGroup).length;
}

const COLORS = ['#7c3aed','#2563eb','#db2777','#d97706','#059669','#0284c7','#dc2626','#0d9488','#9333ea','#b45309'];
function getColor(name) {
  let h = 0; for (const c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}
function getInitials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase() || '?';
}
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setFilter(mode, el) {
  filterMode = mode;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
function filterChats(q) { searchQuery = q; renderList(); }

function renderList() {
  const drop = document.getElementById('drop-zone');
  chatList.innerHTML = '';
  if (drop) chatList.appendChild(drop);

  const q = searchQuery.toLowerCase();
  const list = chats.filter(c => {
    if (filterMode === 'personal') return !c.isGroup;
    if (filterMode === 'groups') return c.isGroup;
    if (filterMode === 'fav') return favorites.has(c.filename);
    return true;
  }).filter(c =>
    !q || c.name.toLowerCase().includes(q) || c.messages.some(m => m.text.toLowerCase().includes(q))
  );

  list.forEach(chat => {
    const idx = chats.indexOf(chat);
    const bg = getColor(chat.name);
    const isFav = favorites.has(chat.filename);
    const lastMsg = chat.messages[chat.messages.length - 1];
    const dateStr = lastMsg?.date || '';
    const div = document.createElement('div');
    div.className = 'chat-item' + (activeIdx === idx ? ' active' : '');
    div.innerHTML = `
      <div class="avatar" style="background:${bg}20;color:${bg}">${getInitials(chat.name)}</div>
      <div class="chat-meta">
        <div class="chat-meta-top">
          <span class="chat-name">${esc(chat.name)}</span>
          <div style="display:flex;align-items:center;gap:3px">
            ${isFav ? '<i class="ti ti-star" style="font-size:12px;color:#f59e0b"></i>' : ''}
            <span class="chat-date">${esc(dateStr)}</span>
          </div>
        </div>
        <div class="chat-preview">
          ${chat.isGroup ? '<span class="badge-group">grupo</span>' : ''}
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(chat.preview || '')}</span>
        </div>
      </div>`;
    div.onclick = () => openChat(idx);
    chatList.appendChild(div);
  });

  const n = chats.length;
  document.getElementById('foot-lbl').textContent = n === 0 ? 'Sin chats cargados' : `${n} chat${n !== 1 ? 's' : ''}`;
}

function openChat(idx) {
  activeIdx = idx;
  renderList();
  const chat = chats[idx];
  const bg = getColor(chat.name);
  const isFav = favorites.has(chat.filename);

  mainArea.innerHTML = `
    <div id="ch-header">
      <div class="avatar" style="background:${bg}20;color:${bg};width:38px;height:38px;font-size:13px;flex-shrink:0">${getInitials(chat.name)}</div>
      <div class="ch-info">
        <div class="ch-name">${esc(chat.name)}</div>
        <div class="ch-sub">${chat.messages.length.toLocaleString()} mensajes${chat.isGroup ? ' · grupo' : ''}</div>
      </div>
      <div class="ch-actions">
        <button class="ch-btn" title="${isFav ? 'Quitar favorito' : 'Agregar a favoritos'}" onclick="toggleFav(${idx})">
          <i class="ti ti-star" style="color:${isFav ? '#f59e0b' : 'inherit'}"></i>
        </button>
        <button class="ch-btn" title="Buscar en este chat" onclick="toggleChatSearch()"><i class="ti ti-search"></i></button>
        <button class="ch-btn" title="Exportar como JSON" onclick="exportSingleJSON(${idx})"><i class="ti ti-download"></i></button>
        <button class="ch-btn" title="Eliminar chat" onclick="confirmDelete(${idx})"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    <div id="ch-searchbar">
      <i class="ti ti-search" style="font-size:15px;color:#9ca3af"></i>
      <input type="text" placeholder="Buscar en el chat..." oninput="searchInChat(this.value,${idx})">
      <span class="sr" id="sr-count"></span>
      <button class="ch-btn" onclick="toggleChatSearch()" style="font-size:15px"><i class="ti ti-x"></i></button>
    </div>
    <div id="msgs"></div>`;

  if (isMobile) closeSidebar();
  renderMessages(idx, '');
}

function renderMessages(idx, q) {
  const chat = chats[idx];
  const area = document.getElementById('msgs');
  if (!area) return;
  area.innerHTML = '';
  let lastDate = null;
  let matchCount = 0;

  chat.messages.forEach(msg => {
    if (msg.date && msg.date !== lastDate) {
      lastDate = msg.date;
      const sep = document.createElement('div');
      sep.className = 'msg sys'; sep.textContent = msg.date; area.appendChild(sep);
    }

    const d = document.createElement('div');
    d.className = 'msg ' + (msg.out ? 'out' : 'inn');

    let inner = '';

    // Nombre del autor en grupos
    if (chat.isGroup && !msg.out && msg.author) {
      inner += `<div class="ms">${esc(msg.author)}</div>`;
    }

    // Contenido
    if (msg.mediaType) {
      const icons = { image: '🖼️ Imagen', video: '🎥 Video', audio: '🎵 Audio', sticker: '🎨 Sticker', media: '📎 Archivo' };
      inner += `<span class="media-ph"><i class="ti ti-${msg.mediaType === 'image' ? 'photo' : msg.mediaType === 'video' ? 'video' : msg.mediaType === 'audio' ? 'microphone' : 'file'}" style="font-size:13px"></i> ${icons[msg.mediaType] || '📎'}</span>`;
    } else {
      let txt = esc(msg.text || '').replace(/\n/g, '<br>');
      if (q && msg.text.toLowerCase().includes(q.toLowerCase())) {
        const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        txt = txt.replace(re, '<mark style="background:#fef08a;color:#111;border-radius:2px;padding:0 1px">$1</mark>');
        matchCount++;
        d.style.outline = '1.5px solid #fde68a';
      }
      inner += `<div>${txt}</div>`;
    }

    if (msg.time) inner += `<div class="mt">${esc(msg.time)}</div>`;
    d.innerHTML = inner;
    area.appendChild(d);
  });

  area.scrollTop = area.scrollHeight;
  const src = document.getElementById('sr-count');
  if (src) src.textContent = q ? matchCount + ' resultado' + (matchCount !== 1 ? 's' : '') : '';
}

function toggleChatSearch() {
  const bar = document.getElementById('ch-searchbar');
  if (!bar) return;
  const show = bar.style.display !== 'flex';
  bar.style.display = show ? 'flex' : 'none';
  if (show) bar.querySelector('input').focus();
  else if (activeIdx !== null) renderMessages(activeIdx, '');
}
function searchInChat(q, idx) { renderMessages(idx, q); }

function toggleFav(idx) {
  const f = chats[idx].filename;
  if (favorites.has(f)) favorites.delete(f); else favorites.add(f);
  openChat(idx); renderList();
}

function confirmDelete(idx) {
  openModal('Eliminar chat', `¿Eliminar "${chats[idx].name}" del backup?\nEsta acción no se puede deshacer.`, () => {
    chats.splice(idx, 1);
    activeIdx = null;
    const logoSrc = document.getElementById('logo-img')?.src || '';
    mainArea.innerHTML = `<div id="main-empty"><img class="empty-logo" src="${logoSrc}" alt=""><p>AntionWhat</p><small>Tu backup local de chats WhatsApp</small></div>`;
    updateStats(); renderList(); toast('Chat eliminado');
  }, 'Eliminar');
}

function exportSingleJSON(idx) {
  const chat = chats[idx];
  const blob = new Blob([JSON.stringify({ meta: { by: 'AntionWhat', date: new Date().toISOString() }, chat }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'antionwhat-' + chat.name.replace(/[^a-z0-9]/gi, '-') + '.json'; a.click();
  toast('Chat exportado ✓');
}

function exportAllJSON() {
  if (!chats.length) { toast('No hay chats para exportar'); return; }
  const blob = new Blob([JSON.stringify({ meta: { by: 'AntionWhat', date: new Date().toISOString(), totalChats: chats.length, totalMessages: chats.reduce((s, c) => s + c.messages.length, 0) }, chats }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'antionwhat-backup-' + new Date().toISOString().slice(0, 10) + '.json'; a.click();
  toast('Backup completo exportado ✓');
}

function showGlobalStats() {
  if (!chats.length) { toast('Cargá chats primero'); return; }
  const total = chats.reduce((s, c) => s + c.messages.length, 0);
  const top = chats.reduce((a, b) => b.messages.length > a.messages.length ? b : a, chats[0]);
  const groups = chats.filter(c => c.isGroup).length;
  openModal('Estadísticas del backup',
    `${chats.length} chats · ${total.toLocaleString()} mensajes\n${groups} grupos · ${chats.length - groups} personales\n\nChat más activo:\n"${top.name}" — ${top.messages.length.toLocaleString()} mensajes`,
    null, 'Cerrar', true);
}

function openModal(title, msg, cb, label = 'Confirmar', noCancel = false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  const btn = document.getElementById('modal-ok');
  btn.textContent = label;
  btn.className = 'mbtn ' + (cb ? 'danger' : 'purple');
  btn.onclick = () => { closeModal(); if (cb) cb(); };
  document.getElementById('modal-cancel').style.display = noCancel ? 'none' : '';
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.opacity = '0', 2500);
}
</script>
